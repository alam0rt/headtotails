# Subnet Router — advertises cluster-internal CIDRs onto the tailnet so
# remote tailnet members can reach pod/service IPs directly.
#
# Exercises:
#   POST   /api/v2/oauth/token
#   POST   /api/v2/tailnet/-/keys
#   GET    /api/v2/device/{deviceId}
#   POST   /api/v2/device/{deviceId}/authorized
#   POST   /api/v2/device/{deviceId}/tags
#   POST   /api/v2/device/{deviceId}/routes              (approve subnet routes)
apiVersion: tailscale.com/v1alpha1
kind: Connector
metadata:
  name: subnet-router
  namespace: demo
spec:
  proxyClass: headscale
  tags:
    - "tag:k8s"
    - "tag:subnet"
  subnetRouter:
    # CHANGEME: CIDRs you want to advertise onto the tailnet.
    routes:
      - "10.0.0.0/16"
      - "10.96.0.0/12"
