# Expose an Ingress onto the tailnet.
#
# Setting ingressClassName: tailscale makes the operator provision a proxy
# pod that terminates TLS and routes traffic to the backend service.
#
# Exercises (same device lifecycle as 03-expose-service):
#   POST   /api/v2/oauth/token
#   POST   /api/v2/tailnet/-/keys
#   GET    /api/v2/device/{deviceId}
#   POST   /api/v2/device/{deviceId}/authorized
#   POST   /api/v2/device/{deviceId}/tags
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  namespace: demo
  labels:
    app: nginx-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-demo
  template:
    metadata:
      labels:
        app: nginx-demo
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-demo
  namespace: demo
spec:
  selector:
    app: nginx-demo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-demo
  namespace: demo
  annotations:
    tailscale.com/proxy-class: headscale
    tailscale.com/tags: "tag:k8s,tag:demo"
    tailscale.com/hostname: "demo-nginx"
spec:
  ingressClassName: tailscale
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-demo
                port:
                  number: 80
