name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

env:
  GO_VERSION: "1.25.5"

jobs:
  # ── Unit tests ─────────────────────────────────────────────────────────────
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: CGO_ENABLED=0 go vet ./...

      - name: Test
        run: CGO_ENABLED=0 go test -count=1 -timeout 5m ./internal/... ./cmd/...

  # ── Integration tests ──────────────────────────────────────────────────────
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Pull headscale image
        run: docker pull headscale/headscale:0.28

      - name: Integration tests
        run: |
          HEADSCALE_INTEGRATION_TEST=1 \
          CGO_ENABLED=0 \
          go test -v -count=1 -timeout 10m ./integration/...

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
