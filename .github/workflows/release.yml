name: Release

on:
  workflow_dispatch:
    inputs:
      build:
        description: "Build number appended to the Tailscale API major version (e.g. 7 → 0.28.7)"
        required: true
        type: string
      patch:
        description: "Optional patch suffix appended as -<patch> (e.g. rc1)"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.25.5"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  version:
    name: Compute release version
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.compute.outputs.release_version }}
      ts_api_major: ${{ steps.compute.outputs.ts_api_major }}
      image_tags: ${{ steps.compute.outputs.image_tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          build="${{ github.event.inputs.build }}"
          patch="${{ github.event.inputs.patch }}"

          if [[ ! "${build}" =~ ^[0-9A-Za-z._-]+$ ]]; then
            echo "Invalid build input: ${build}" >&2
            exit 1
          fi

          if [[ -n "${patch}" && ! "${patch}" =~ ^[0-9A-Za-z._-]+$ ]]; then
            echo "Invalid patch input: ${patch}" >&2
            exit 1
          fi

          # Extract the target Tailscale API version from source.
          ts_api_full=$(grep -oP 'targetTailscaleAPIVersion\s*=\s*"\K[^"]+' cmd/headtotails/main.go)
          if [[ -z "${ts_api_full}" ]]; then
            echo "Could not extract targetTailscaleAPIVersion from cmd/headtotails/main.go" >&2
            exit 1
          fi
          # Major is the first two segments, e.g. "0.28" from "0.28.0".
          ts_api_major="${ts_api_full%.*}"

          version="${ts_api_major}.${build}"
          if [[ -n "${patch}" ]]; then
            version="${version}-${patch}"
          fi

          image_base="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          # Three tags per release:
          #   1. Exact version       — e.g. 0.28.7 or 0.28.7-rc1
          #   2. Tailscale API compat — e.g. ts-api-0.28 (floating)
          #   3. latest                              (floating)
          tags="${image_base}:${version}"
          tags="${tags},${image_base}:ts-api-${ts_api_major}"
          tags="${tags},${image_base}:latest"

          echo "release_version=${version}" >> "${GITHUB_OUTPUT}"
          echo "ts_api_major=${ts_api_major}" >> "${GITHUB_OUTPUT}"
          echo "image_tags=${tags}" >> "${GITHUB_OUTPUT}"

  # ── Build & push container image ───────────────────────────────────────────
  docker:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ needs.version.outputs.image_tags }}
          build-args: |
            VERSION=${{ needs.version.outputs.release_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release with binaries ───────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - version
      - docker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build linux/amd64 binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -X main.version=${{ needs.version.outputs.release_version }}" \
            -o headtotails-linux-amd64-${{ needs.version.outputs.release_version }} ./cmd/headtotails

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.release_version }}
          name: ${{ needs.version.outputs.release_version }}
          generate_release_notes: true
          files: headtotails-linux-amd64-${{ needs.version.outputs.release_version }}
