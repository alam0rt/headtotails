name: Release

on:
  workflow_dispatch:
    inputs:
      build:
        description: "Build segment after 0.28. (e.g. 7)"
        required: true
        type: string
      patch:
        description: "Optional patch suffix appended as -<patch> (e.g. rc1)"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.25.5"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  version:
    name: Compute release version
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.compute.outputs.release_version }}
      image_tag: ${{ steps.compute.outputs.image_tag }}
    steps:
      - name: Compute version
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          build="${{ github.event.inputs.build }}"
          patch="${{ github.event.inputs.patch }}"

          if [[ ! "${build}" =~ ^[0-9A-Za-z._-]+$ ]]; then
            echo "Invalid build input: ${build}" >&2
            exit 1
          fi

          if [[ -n "${patch}" && ! "${patch}" =~ ^[0-9A-Za-z._-]+$ ]]; then
            echo "Invalid patch input: ${patch}" >&2
            exit 1
          fi

          version="0.28.${build}"
          if [[ -n "${patch}" ]]; then
            version="${version}-${patch}"
          fi

          echo "release_version=${version}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${version}" >> "${GITHUB_OUTPUT}"

  # ── Build & push container image ───────────────────────────────────────────
  docker:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ needs.version.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package public
        run: |
          PACKAGE_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          # Determine if owner is an org or user
          ACCOUNT_TYPE=$(gh api users/${OWNER} --jq '.type')
          if [ "$ACCOUNT_TYPE" = "Organization" ]; then
            gh api --method PATCH \
              /orgs/${OWNER}/packages/container/${PACKAGE_NAME} \
              -f visibility=public
          else
            gh api --method PATCH \
              /user/packages/container/${PACKAGE_NAME} \
              -f visibility=public
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── GitHub Release with binaries ───────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - version
      - docker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build linux/amd64 binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -X main.version=${{ needs.version.outputs.release_version }}" \
            -o headtotails-linux-amd64-${{ needs.version.outputs.release_version }} ./cmd/headtotails

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.release_version }}
          name: ${{ needs.version.outputs.release_version }}
          generate_release_notes: true
          files: headtotails-linux-amd64-${{ needs.version.outputs.release_version }}
