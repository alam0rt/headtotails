apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Pin the image digest for production reproducibility.
# Update this tag on each release.
images:
  - name: ghcr.io/alam0rt/headtotail
    newTag: latest

# Generate the Secret from a local env file.
# Create secret.env by copying secret.env.example and filling in real values.
secretGenerator:
  - name: headapi-secrets
    envs:
      - secret.env
    options:
      disableNameSuffixHash: true

# Production-specific patches
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: headapi
