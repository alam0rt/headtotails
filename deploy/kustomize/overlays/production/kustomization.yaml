apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This overlay deploys headtotails itself.
# To also wire the Tailscale Kubernetes operator to use headscale + headtotails,
# apply the operator overlay separately:
#
#   kubectl apply -k deploy/kustomize/operator
#
# See deploy/kustomize/operator/kustomization.yaml for prerequisites.

resources:
  - ../../base

# Pin the image digest for production reproducibility.
# Update this tag on each release.
images:
  - name: ghcr.io/alam0rt/headtotails
    newTag: latest

# Generate the Secret from a local env file.
# Create secret.env by copying secret.env.example and filling in real values.
secretGenerator:
  - name: headtotails-secrets
    envs:
      - secret.env
    options:
      disableNameSuffixHash: true

# Production-specific patches
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: headtotails
