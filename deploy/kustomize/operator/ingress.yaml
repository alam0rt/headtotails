# Ingress — routes /api/v2 and /oauth/token to headtotails on the existing
# headscale hostname. This is a *separate* Ingress object (Option B) so that
# the Flux-managed headscale Ingress is not touched.
#
# nginx-ingress merges multiple Ingress objects for the same host into one
# server block, ordered by path specificity. /api/v2 and /oauth/token are
# more specific than / and will always win.
#
# The TLS secret (headscale-tls) is shared with the headscale Ingress; no
# new certificate is needed — cert-manager has already issued it.
#
# ops-kube: set spec.rules[0].host and spec.tls[0].hosts[0] to your
#           headscale public hostname, e.g. headscale.example.com
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headtotails
  namespace: headscale
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
spec:
  tls:
    - hosts:
        - headscale.example.com  # CHANGEME: your headscale public hostname
      secretName: headscale-tls  # shared with the headscale Ingress
  rules:
    - host: headscale.example.com  # CHANGEME: your headscale public hostname
      http:
        paths:
          # Management API — routes to headtotails
          - path: /api/v2
            pathType: Prefix
            backend:
              service:
                name: headtotails
                port:
                  number: 8080
          # OAuth2 token endpoint — routes to headtotails
          - path: /oauth/token
            pathType: Exact
            backend:
              service:
                name: headtotails
                port:
                  number: 8080
