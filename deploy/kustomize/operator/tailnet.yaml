# Tailnet CR — tells the Tailscale operator to use headscale as its control plane
# and headtotails as the management API, via the shared ingress hostname.
#
# loginUrl must point to the public URL of your headscale server.
# The operator's management API calls are routed to headtotails via the
# /api/v2 and /oauth/token paths on that same host (see ingress.yaml).
#
# ops-kube: set loginUrl to your headscale public URL, e.g.:
#   https://headscale.example.com
apiVersion: tailscale.com/v1alpha1
kind: Tailnet
metadata:
  name: headscale
  namespace: tailscale
spec:
  # credentials.secretName must reference the operator-oauth Secret, which
  # holds the client_id and client_secret that match OAUTH_CLIENT_ID and
  # OAUTH_CLIENT_SECRET in the headtotails deployment.
  credentials:
    secretName: operator-oauth
  # loginUrl is the headscale VPN control plane URL. tailscaled processes
  # spawned by the operator will register here instead of controlplane.tailscale.com.
  loginUrl: "https://headscale.example.com"  # CHANGEME: your headscale public URL
