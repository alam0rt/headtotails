apiVersion: v1
kind: ConfigMap
metadata:
  name: control-router-nginx
  namespace: headscale
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      location = /oauth/token {
        proxy_pass http://headtotails.headscale.svc.cluster.local:8080;
      }

      location /api/v2/ {
        proxy_pass http://headtotails.headscale.svc.cluster.local:8080;
      }

      location / {
        proxy_pass http://headscale.headscale.svc.cluster.local:8080;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-router
  namespace: headscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-router
  template:
    metadata:
      labels:
        app: control-router
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: nginx-conf
          configMap:
            name: control-router-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: control-router
  namespace: headscale
spec:
  selector:
    app: control-router
  ports:
    - name: http
      port: 80
      targetPort: http
