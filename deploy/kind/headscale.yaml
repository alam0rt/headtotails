apiVersion: v1
kind: Namespace
metadata:
  name: headscale
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: headscale-config
  namespace: headscale
data:
  config.yaml: |
    server_url: http://control-router.headscale.svc.cluster.local
    listen_addr: 0.0.0.0:8080
    grpc_listen_addr: 0.0.0.0:50443
    grpc_allow_insecure: true
    noise:
      private_key_path: /var/lib/headscale/noise_private.key
    private_key_path: /var/lib/headscale/private.key
    prefixes:
      v4: 100.64.0.0/10
      v6: fd7a:115c:a1e0::/48
      allocation: sequential
    derp:
      server:
        enabled: true
        region_id: 999
        region_code: kind-headscale
        region_name: kind-headscale
        stun_listen_addr: 0.0.0.0:3478
        private_key_path: /var/lib/headscale/derp_private.key
      urls: []
      paths: []
      auto_update_enabled: false
      update_frequency: 24h
    disable_check_updates: true
    database:
      type: sqlite
      sqlite:
        path: /var/lib/headscale/db.sqlite
    dns:
      magic_dns: false
      base_domain: headtotails.test
      override_local_dns: false
      nameservers:
        global: []
    policy:
      mode: database
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headscale
  namespace: headscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headscale
  template:
    metadata:
      labels:
        app: headscale
    spec:
      containers:
        - name: headscale
          image: headscale/headscale:0.28
          imagePullPolicy: IfNotPresent
          args: ["serve"]
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50443
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/headscale/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: data
              mountPath: /var/lib/headscale
      volumes:
        - name: config
          configMap:
            name: headscale-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: headscale
  namespace: headscale
spec:
  selector:
    app: headscale
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 50443
      targetPort: grpc
