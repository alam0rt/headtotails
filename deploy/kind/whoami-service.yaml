apiVersion: v1
kind: Namespace
metadata:
  name: kind-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: kind-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
        - name: whoami
          image: hashicorp/http-echo:1.0.0
          args:
            - -text=hello-from-kind
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: kind-test
  annotations:
    tailscale.com/expose: "true"
spec:
  selector:
    app: whoami
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 5678
